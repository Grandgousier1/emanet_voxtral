# Configuration for the Automated Subtitling Pipeline

# -----------------------------------------------------------------------------
# Model Paths
# -----------------------------------------------------------------------------
# Specifies the pre-trained models to be used for transcription and translation.
# These can be local paths or Hugging Face model identifiers.
model_paths:
  voxtral_small: "collabora/whisperspeech_asr_small_en"
  voxtral_mini: "collabora/whisperspeech_asr_mini_en"
  faster_whisper: "ctranslate2-4you/whisper-small-en-ct2-int8"
  translation: "facebook/nllb-200-distilled-600M"

# -----------------------------------------------------------------------------
# Transcription Options
# -----------------------------------------------------------------------------
# Settings related to the Automatic Speech Recognition (ASR) process.
transcription_options:
  # Device for transcription models. "cuda" for GPU, "cpu" for CPU.
  device: "cuda"

# -----------------------------------------------------------------------------
# Translation Options
# -----------------------------------------------------------------------------
# Settings for the translation process.
translation_options:
  # Device for the translation model. "cuda" for GPU, "cpu" for CPU.
  device: "cuda"
  # The type of model to use for translation.
  # "nllb" for the original NLLB model (requires source_lang).
  # "mistral" for a Mistral instruct model (source language is detected automatically).
  model_type: "nllb"
  # Source language for translation. Required for NLLB, ignored for Mistral.
  source_lang: "eng_Latn"
  # Target language for translation (e.g., "fra_Latn" for French).
  target_lang: "fra_Latn"

# -----------------------------------------------------------------------------
# YouTube Download (yt-dlp) Options
# -----------------------------------------------------------------------------
# Settings for downloading media from YouTube and other sites.
youtube_dl_options:
  # Directory where all output files (videos, audios, subtitles) will be saved.
  output_dir: "output"
  # If true, downloads the video file.
  download_video: true
  # If true, extracts and saves the audio file (required for transcription).
  download_audio: true
  # Path to a cookies.txt file to handle YouTube's anti-bot measures.
  # Set to null or remove if not needed.
  cookies: null # Example: "/path/to/your/cookies.txt"
