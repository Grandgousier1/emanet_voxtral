# Configuration for the Automated Subtitling Pipeline

# -----------------------------------------------------------------------------
# Model Paths
# -----------------------------------------------------------------------------
# Specifies the pre-trained models to be used.
model_paths:
  # The primary model for the 'voxtral_single_step' pipeline.
  voxtral: "mistralai/Voxtral-Small-24B-2507"
  # Fallback ASR model for the 'two_step' pipeline.
  faster_whisper: "ctranslate2-4you/whisper-large-v2-ct2-int8"
  # Translation model for the 'two_step' pipeline (NLLB).
  nllb_translation: "facebook/nllb-200-distilled-600M"

# -----------------------------------------------------------------------------
# Pipeline Options
# -----------------------------------------------------------------------------
# Defines the overall behavior of the pipeline.
pipeline_options:
  # "two_step": Classic approach. Transcribe first, then translate. Works with any ASR/translation model combination.
  # "voxtral_single_step": Uses Voxtral's audio instruct capability to transcribe and translate in one pass.
  type: "voxtral_single_step"

# -----------------------------------------------------------------------------
# Transcription Options
# -----------------------------------------------------------------------------
# Settings related to the Automatic Speech Recognition (ASR) process.
transcription_options:
  # Device for transcription models. "cuda" for GPU, "cpu" for CPU.
  device: "cuda"

# -----------------------------------------------------------------------------
# Translation Options
# -----------------------------------------------------------------------------
# Settings for the translation process.
translation_options:
  # Device for the translation model. "cuda" for GPU, "cpu" for CPU.
  device: "cuda"
  # The type of model to use for translation in the 'two_step' pipeline.
  # The 'voxtral_single_step' pipeline does not use this.
  model_type: "nllb"
  # Source language for NLLB translation. Ignored by Voxtral.
  # Example: "tur_Latn" for Turkish
  source_lang: "tur_Latn"
  # Target language for translation.
  # For 'voxtral_single_step', use full names (e.g., "French", "Spanish").
  # For 'two_step' with NLLB, use codes (e.g., "fra_Latn", "spa_Latn").
  target_lang: "French"

# -----------------------------------------------------------------------------
# YouTube Download (yt-dlp) Options
# -----------------------------------------------------------------------------
# Settings for downloading media from YouTube and other sites.
youtube_dl_options:
  # Directory where all output files (videos, audios, subtitles) will be saved.
  output_dir: "output"
  # If true, downloads the video file.
  download_video: true
  # If true, extracts and saves the audio file (required for transcription).
  download_audio: true
  # Path to a cookies.txt file to handle YouTube's anti-bot measures.
  # Set to null or remove if not needed.
  cookies: null # Example: "/path/to/your/cookies.txt"
